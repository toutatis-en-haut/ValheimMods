name: Personal Gateway

on:
  push:
    branches: [ main ]
    paths:
      - 'PersonalGateway/**'
      - '.github/workflows/personal-gateway.yml'
    tags:
      - 'personalgateway-v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'PersonalGateway/**'
      - '.github/workflows/personal-gateway.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build & package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('PersonalGateway/PersonalGateway.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install SteamCMD prerequisites
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl tar \
            lib32gcc-s1 lib32stdc++6
          mkdir -p "$HOME/steamcmd"
          curl -fsSL https://media.steampowered.com/installer/steamcmd_linux.tar.gz \
            | tar -xz -C "$HOME/steamcmd"
          chmod +x "$HOME/steamcmd/steamcmd.sh"
          [ -f "$HOME/steamcmd/linux32/steamcmd" ] && chmod +x "$HOME/steamcmd/linux32/steamcmd" || true
          ls -la "$HOME/steamcmd"

      - name: Cache Valheim dedicated server
        id: cache-valheim
        uses: actions/cache@v4
        with:
          path: ~/valheim-server
          key: valheim-server-${{ runner.os }}-v1

      - name: Download Valheim dedicated server
        if: steps.cache-valheim.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p "$HOME/valheim-server"
          attempt=0
          max=5
          until [ $attempt -ge $max ]; do
            attempt=$((attempt + 1))
            echo "::group::SteamCMD attempt $attempt/$max"
            if "$HOME/steamcmd/steamcmd.sh" \
                +force_install_dir "$HOME/valheim-server" \
                +login anonymous \
                +app_update 896660 validate \
                +quit; then
              echo "::endgroup::"
              echo "SteamCMD succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::SteamCMD attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          echo "::error::SteamCMD failed after $max attempts"
          exit 1

      - name: Verify Valheim DLLs
        run: |
          MANAGED="$HOME/valheim-server/valheim_server_Data/Managed"
          test -f "$MANAGED/assembly_valheim.dll" || { echo "::error::assembly_valheim.dll not found at $MANAGED"; ls -la "$HOME/valheim-server" || true; exit 1; }
          echo "Managed DLLs found at $MANAGED"

      - name: Restore
        working-directory: PersonalGateway
        run: dotnet restore

      - name: Build (Release)
        working-directory: PersonalGateway
        run: |
          dotnet build -c Release --no-restore \
            -p:ValheimManaged="$HOME/valheim-server/valheim_server_Data/Managed"

      - name: Stage release contents
        working-directory: PersonalGateway
        run: |
          set -e
          rm -rf release
          mkdir -p release/PersonalGateway
          cp bin/Release/PersonalGateway.dll release/PersonalGateway/
          if [ -d assets ]; then cp -r assets release/PersonalGateway/; fi
          cd release && zip -r ../PersonalGateway.zip PersonalGateway

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonalGateway
          path: PersonalGateway/PersonalGateway.zip
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/personalgateway-v')
        uses: softprops/action-gh-release@v2
        with:
          files: PersonalGateway/PersonalGateway.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
